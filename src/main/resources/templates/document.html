<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Document 등록</title>
</head>
<body>

<h2>문서 등록</h2>

<textarea id="content" rows="10" cols="80"></textarea>

<br><br>

<button onclick="save()">텍스트 저장</button>

<hr>

<h2>파일 등록</h2>

<input type="file" id="file">

<br><br>

<button onclick="uploadFile()">파일 업로드</button>

<script>

    // 기존 텍스트 저장
    function save(){

        const content = document.getElementById("content").value;

        fetch("/document",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                content:content
            })
        })
            .then(res => {

                if(!res.ok){
                    throw new Error("저장 실패");
                }

                return res.text();

            })
            .then(data => {
                alert("텍스트 저장 성공");
            })
            .catch(err => {
                alert("저장 실패");
                console.error(err);
            });
    }



    // 파일 업로드
    function uploadFile(){

        const fileInput = document.getElementById("file");

        if(fileInput.files.length === 0){
            alert("파일을 선택하세요");
            return;
        }

        const formData = new FormData();

        formData.append("file", fileInput.files[0]);

        fetch("/document/file",{
            method:"POST",
            body:formData
        })
            .then(res => {

                if(!res.ok){
                    throw new Error("업로드 실패");
                }

                return res.text();

            })
            .then(data => {
                alert("파일 업로드 성공");
            })
            .catch(err => {
                alert("업로드 실패");
                console.error(err);
            });
    }

</script>

</body>
</html>
